name: Deploy to GitHub Pages

on:
  push:
    branches: [master] # 保持 master，因为你的截图显示你用的是 master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install, build, and upload with Astro
        uses: withastro/action@v3
        with:
          # 如果你的 package.json 不在根目录，取消下面这行的注释并修改路径
          path: . 

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4